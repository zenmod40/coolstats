<?xml version="1.0" encoding="UTF-8"?>
<!--
  ZM40 — Gabarit de logo module
  Placeholders substitués par generate-logos.sh :
    #2D3DFF   : couleur de fond (ex: #FF4A1C)
    #FAF0DD   : couleur typo (cream, fixe : #FAF0DD)
    CST   : 2 lettres centrées (ex: CC)
    CoolStats       : nom commercial du module (ex: CoolCheck)
    rgba(250,240,221,0.65)  : version 65% opacité pour les textes header/footer
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond carré arrondi -->
  <rect width="512" height="512" rx="56" ry="56" fill="#2D3DFF"/>

  <!-- Header en haut (texte mono court) -->
  <text x="256" y="64"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, 'Courier New', monospace"
        font-size="20"
        font-weight="500"
        letter-spacing="2"
        fill="rgba(250,240,221,0.65)">PRESTASHOP · MODULE</text>

  <!-- Monogramme central (2 lettres) -->
  <text x="256" y="320"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
        font-size="220"
        font-weight="900"
        letter-spacing="-12"
        fill="#FAF0DD">CST</text>

  <!-- Nom du module -->
  <text x="256" y="408"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Inter', sans-serif"
        font-size="40"
        font-weight="800"
        fill="#FAF0DD">CoolStats</text>

  <!-- Tiret pointillé séparateur -->
  <line x1="120" y1="440" x2="392" y2="440"
        stroke="rgba(250,240,221,0.65)"
        stroke-width="1.5"
        stroke-dasharray="3 4"/>

  <!-- Footer (tagline ZM40) -->
  <text x="256" y="470"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="16"
        fill="rgba(250,240,221,0.65)">by ZM40 · zm40.com</text>
</svg>
