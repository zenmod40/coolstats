name: "🐛 Signaler un bug"
description: "Un comportement inattendu, une erreur ou un plantage"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler un bug 🙏
        *(Besoin d'aide à l'installation/config ou d'une adaptation ? Voir le lien « Aide » — c'est une prestation, pas un bug.)*
  - type: input
    id: ps_version
    attributes:
      label: "Version de PrestaShop"
      placeholder: "ex. 8.1.7"
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: "Version de PHP"
      placeholder: "ex. 8.1"
    validations:
      required: true
  - type: input
    id: module_version
    attributes:
      label: "Version de CoolStats"
      placeholder: "ex. 1.0.2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Étapes pour reproduire"
      description: "Que faut-il faire pour voir le bug ?"
      placeholder: |
        1. Aller dans …
        2. Cliquer sur …
        3. Constater que …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Comportement attendu"
      description: "Ce qui aurait dû se passer."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: "Message d'erreur / logs"
      description: "Erreur PHP (var/logs/), console JS, capture d'écran… si vous en avez."
      render: shell
    validations:
      required: false
  - type: dropdown
    id: theme
    attributes:
      label: "Thème visuel actif (si pertinent)"
      options:
        - "Aurora (défaut)"
        - "Cozy"
        - "Editorial"
        - "Brutalist"
        - "Terminal"
        - "Je ne sais pas"
    validations:
      required: false
